services:
  backend:
    build: ./backend
    container_name: fua-backend
    restart: unless-stopped
    ports:
      - "5241:5241"
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=http://localhost,http://localhost:80

  frontend:
    build: ./frontend
    container_name: fua-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
